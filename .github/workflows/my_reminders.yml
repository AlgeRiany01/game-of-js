name: Personal Daily Schedule

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '25 13 * * 0-4,6'   # 03:25 PM المحلي
    - cron: '26 13 * * 0-4,6'   # 03:26 PM المحلي
    - cron: '20 5 * * 0-4,6'    # 07:20 AM
    - cron: '20 13 * * 0-4,6'   # 03:20 PM
    - cron: '30 13 * * 0-4,6'   # 03:30 PM
    - cron: '0 15 * * 0-4,6'    # 05:00 PM
    - cron: '0 16 * * 0-4,6'    # 06:00 PM
    - cron: '45 17 * * 0-4,6'   # 07:45 PM
    - cron: '30 19 * * 0-4,6'   # 09:30 PM
    - cron: '0 21 * * 0-4,6'    # 11:00 PM

jobs:
  send_reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Send Message
        run: |
          # الحصول على الوقت الحالي بتوقيت UTC
          TIME=$(date +%H:%M)
          
          case "$TIME" in
            "13:25") MSG="⏰ تنبيه الساعة 03:25: قرب موعد المغادرة، راجع مهامك الأخيرة." ;;
            "13:26") MSG="⏰ تنبيه الساعة 03:26: دقيقة واحدة متبقية! استعد." ;;
            "05:20") MSG="🚀 صباح الخير! حان وقت الخروج من البيت. طريق السلامة." ;;
            "13:20") MSG="💼 جهز حالك، 10 دقائق وتطلع من الشركة. سكر ملفاتك ونظف مكتبك." ;;
            "13:30") MSG="🚗 تم بحمد الله.. وقت الروح! استمتع بالطريق وحاول تفصل عن الشغل." ;;
            "15:00") MSG="🏠 وصلت الحوش؟ صحة وغداء وراحة نص ساعة لـ ساعة بعيد عن الشاشة." ;;
            "16:00") MSG="🎓 وقت الجد: ابدأ في مشروع التخرج. ساعة ونصف تركيز عالي." ;;
            "17:45") MSG="💻 وقت الفري لانس: اشتغل على مشاريعك الخاصة الآن." ;;
            "19:30") MSG="💬 وقت الراحة والأهل: هدرز معهم، وشوف جروبات الجامعة وأخبار الدراسة." ;;
            "21:00") MSG="😴 خلاص شغل.. عشاء خفيف ونوم هانئ لتجديد الطاقة. تصبح على خير." ;;
            *) MSG="🔔 تذكير: استمر في إنجازاتك اليومية! (وقت التشغيل الحالي: $TIME)" ;;
          esac

          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="$MSG"
