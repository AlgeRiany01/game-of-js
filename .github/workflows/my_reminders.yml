name: Personal Daily Schedule

on:
  schedule:
    # ملاحظة: الأوقات هنا بتوقيت UTC (يجب طرح ساعتين من توقيتك المحلي إذا كان UTC+2)
    - cron: '20 5 * * 0-4,6'   # 07:20 صباحاً - وقت الخروج من البيت
    - cron: '20 13 * * 0-4,6'  # 03:20 مساءً - تجهيز الخروج من الشركة
    - cron: '30 13 * * 0-4,6'  # 03:30 مساءً - وقت الروح من الخدمة
    - cron: '0 15 * * 0-4,6'   # 05:00 مساءً - وصول البيت والراحة
    - cron: '0 16 * * 0-4,6'   # 06:00 مساءً - بداية مشروع التخرج
    - cron: '45 17 * * 0-4,6'  # 07:45 مساءً - شغل الفري لانس
    - cron: '30 19 * * 0-4,6'  # 09:30 مساءً - عائلة وجامعة
    - cron: '0 21 * * 0-4,6'   # 11:00 مساءً - وقت النوم

jobs:
  send_reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Send Message
        run: |
          # تحديد الرسالة بناءً على وقت المشغل (Trigger)
          # نستخدم التوقيت بنظام 24 ساعة (UTC)
          TIME=$(date +%H:%M)
          
          case "$TIME" in
            "05:20") MSG="🚀 صباح الخير! حان وقت الخروج من البيت. طريق السلامة." ;;
            "13:20") MSG="💼 جهز حالك، 10 دقائق وتطلع من الشركة. سكر ملفاتك ونظف مكتبك." ;;
            "13:30") MSG="🚗 تم بحمد الله.. وقت الروح! استمتع بالطريق وحاول تفصل عن الشغل." ;;
            "15:00") MSG="🏠 وصلت الحوش؟ صحة وغداء وراحة نص ساعة لـ ساعة بعيد عن الشاشة." ;;
            "16:00") MSG="🎓 وقت الجد: ابدأ في مشروع التخرج. ساعة ونصف تركيز عالي." ;;
            "17:45") MSG="💻 وقت الفري لانس: اشتغل على مشاريعك الخاصة الآن." ;;
            "19:30") MSG="💬 وقت الراحة والأهل: هدرز معهم، وشوف جروبات الجامعة وأخبار الدراسة." ;;
            "21:00") MSG="😴 خلاص شغل.. عشاء خفيف ونوم هانئ لتجديد الطاقة. تصبح على خير." ;;
            *) MSG="تذكير: استمر في إنجازاتك اليومية! ✨" ;;
          esac

          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="$MSG"
