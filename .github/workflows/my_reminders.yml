name: Instant Test Reminder

on:
  push:
    branches: [ main ]  # سيرسل تنبيه بمجرد أن ترفع الكود (Push)
  workflow_dispatch:      # يتيح لك الضغط على زر التشغيل يدوياً

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Message
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="🚀 <b>تجربة ناجحة!</b> التنبيه يعمل الآن من GitHub Actions حتى والجهاز مغلق." \
          -d parse_mode="HTML"
